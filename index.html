<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💻 みんなのスクラッチ作品ギャラリー</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Kosugi+Maru&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow: #FFD93D; --pink: #FF6B9D; --blue: #4ECDC4;
      --purple: #C77DFF; --green: #6BCB77; --orange: #FF9F43;
      --bg: #FFF8F0; --dark: #2D2D2D; --card-radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Kosugi Maru', sans-serif; background: var(--bg); min-height: 100vh; overflow-x: hidden; }
    header {
      position: relative;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f64f59 100%);
      padding: 48px 24px 80px; text-align: center; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.08'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .header-emoji { font-size: 64px; display: block; animation: bounce 2s infinite; position: relative; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    header h1 { font-family:'Nunito',sans-serif; font-weight:900; font-size:clamp(28px,6vw,52px); color:white; text-shadow:3px 3px 0 rgba(0,0,0,0.2); position:relative; margin-top:12px; }
    header p { color:rgba(255,255,255,0.9); font-size:18px; margin-top:8px; position:relative; }
    .wave { position:absolute; bottom:-2px; left:0; width:100%; }
    .deco { position:absolute; border-radius:50%; opacity:0.3; animation:float 6s ease-in-out infinite; }
    .deco:nth-child(1){width:80px;height:80px;background:var(--yellow);top:10%;left:5%;animation-delay:0s}
    .deco:nth-child(2){width:50px;height:50px;background:var(--pink);top:30%;right:8%;animation-delay:1s}
    .deco:nth-child(3){width:100px;height:100px;background:var(--blue);bottom:20%;left:10%;animation-delay:2s}
    @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(10deg)}}
    main { max-width:1100px; margin:0 auto; padding:48px 24px 64px; }
    .section-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:28px; color:var(--dark); margin-bottom:32px; display:flex; align-items:center; gap:12px; }
    .section-title::after { content:''; flex:1; height:4px; background:linear-gradient(to right,var(--purple),transparent); border-radius:2px; }
    .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:28px; }
    .card { background:white; border-radius:var(--card-radius); overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,0.08); transition:transform 0.25s ease,box-shadow 0.25s ease; cursor:pointer; text-decoration:none; display:block; color:inherit; }
    .card:hover { transform:translateY(-8px) rotate(-1deg); box-shadow:0 20px 40px rgba(0,0,0,0.15); }
    .card-accent{height:8px}
    .card:nth-child(5n+1) .card-accent{background:linear-gradient(90deg,var(--yellow),var(--orange))}
    .card:nth-child(5n+2) .card-accent{background:linear-gradient(90deg,var(--pink),var(--purple))}
    .card:nth-child(5n+3) .card-accent{background:linear-gradient(90deg,var(--blue),var(--green))}
    .card:nth-child(5n+4) .card-accent{background:linear-gradient(90deg,var(--purple),var(--pink))}
    .card:nth-child(5n+5) .card-accent{background:linear-gradient(90deg,var(--green),var(--blue))}
    .card-thumb { width:100%; aspect-ratio:16/9; background:linear-gradient(135deg,#f5f7fa,#e8ecf0); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .play-badge { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); background:rgba(255,255,255,0.95); width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; transition:transform 0.2s ease; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
    .card:hover .play-badge{transform:translate(-50%,-50%) scale(1)}
    .card-body{padding:18px 20px 20px}
    .card-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:var(--dark);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-author{font-size:14px;color:#888;display:flex;align-items:center;gap:6px}
    .card-author::before{content:'✏️';font-size:13px}
    .card-date{font-size:12px;color:#bbb;margin-top:8px}
    .empty-state{grid-column:1/-1;text-align:center;padding:64px 24px;color:#aaa}
    .empty-state .empty-icon{font-size:80px;display:block;margin-bottom:16px}
    .empty-state p{font-size:20px}
    footer{text-align:center;padding:32px;color:#bbb;font-size:14px}
    @media(max-width:480px){.gallery{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div class="deco"></div><div class="deco"></div><div class="deco"></div>
  <span class="header-emoji">💻</span>
  <h1>みんなのスクラッチ作品</h1>
  <p>プログラミングで作ったゲームや作品を遊んでみよう！</p>
  <svg class="wave" viewBox="0 0 1440 60" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,30 C360,60 1080,0 1440,30 L1440,60 L0,60 Z" fill="#FFF8F0"/>
  </svg>
</header>
<main>
  <h2 class="section-title">✨ 作品一覧</h2>
  <div class="gallery" id="gallery"></div>
</main>
<footer><p>🌟 みんなよくできました！</p></footer>
<script>
  async function loadGallery() {
    const gallery = document.getElementById('gallery');
    let works = [];
    try {
      const res = await fetch('works.json');
      if (!res.ok) throw new Error('not found');
      works = await res.json();
    } catch(e) {}

    if (works.length === 0) {
      gallery.innerHTML = `<div class="empty-state"><span class="empty-icon">🚀</span><p>作品がまだありません。<br>さっそくアップロードしよう！</p></div>`;
      return;
    }

    works.sort((a, b) => new Date(b.date) - new Date(a.date));

    works.forEach(work => {
      const card = document.createElement('a');
      card.className = 'card';

      // htmlタイプはそのまま開く、sb3タイプはplayer.htmlで開く
      if (work.type === 'html') {
        card.href = `works/${work.file}`;
      } else {
        card.href = `player.html?file=works/${work.file}&title=${encodeURIComponent(work.title)}&author=${encodeURIComponent(work.author || '')}`;
      }
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      const dateStr = work.date
        ? new Date(work.date).toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric'})
        : '';

      card.innerHTML = `
        <div class="card-accent"></div>
        <div class="card-thumb">
          <span style="font-size:56px">💻</span>
          <div class="play-badge">▶️</div>
        </div>
        <div class="card-body">
          <div class="card-title">${esc(work.title)}</div>
          <div class="card-author">${esc(work.author || 'なまえなし')}</div>
          ${dateStr ? `<div class="card-date">📅 ${dateStr}</div>` : ''}
        </div>`;
      gallery.appendChild(card);
    });
  }

  function esc(str) {
    return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  loadGallery();
</script>
</body>
</html>
