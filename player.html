<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品プレイヤー</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Kosugi+Maru&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Kosugi Maru', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 8px 16px;
      font-family: 'Kosugi Maru', sans-serif;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.35); }

    .header-info { flex: 1; }
    .header-info h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 20px;
      color: white;
    }
    .header-info p { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 2px; }

    .player-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .player-container {
      width: 100%;
      max-width: 800px;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      aspect-ratio: 16/9;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: white;
      gap: 16px;
      font-size: 18px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #C77DFF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <a class="back-btn" href="javascript:history.back()">← もどる</a>
  <div class="header-info">
    <h1 id="work-title">よみこみちゅう…</h1>
    <p id="work-author"></p>
  </div>
</header>

<div class="player-wrap">
  <div class="player-container">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>よみこみちゅう…</span>
    </div>
    <iframe id="player" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const file   = params.get('file');
  const title  = params.get('title') || '作品';
  const author = params.get('author') || '';

  document.title = title + ' - スクラッチギャラリー';
  document.getElementById('work-title').textContent = title;
  if (author) document.getElementById('work-author').textContent = '✏️ ' + author;

  if (file) {
    const base = location.origin + location.pathname.replace('player.html', '');
    const sb3url = base + file;
    const playerUrl = `https://turbowarp.org/embed#url=${encodeURIComponent(sb3url)}`;
    const iframe = document.getElementById('player');
    iframe.src = playerUrl;
    iframe.onload = () => document.getElementById('loading').style.display = 'none';
  }
</script>
</body>
</html>
