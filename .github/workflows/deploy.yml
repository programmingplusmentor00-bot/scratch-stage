name: 🎮 Scratch作品を公開する

on:
  push:
    paths:
      - 'uploads/**'   # uploads/ フォルダにzipが追加されたら自動実行

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 作品を処理・展開する
        run: python scripts/process_uploads.py

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add works/ works.json
          git diff --cached --quiet || git commit -m "🎮 新しい作品を追加"
          git push
